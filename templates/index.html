<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --info: #6366f1;
      --muted: #94a3b8;
      --text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 900px;
      max-width: 95%;
      background: var(--card);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,.45);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
    }

    header span {
      font-size: 14px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: var(--accent);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      color: white;
      font-size: 14px;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
    }

    .add { background: var(--success); }
    .train { background: var(--info); }
    .recognise { background: var(--warning); }
    .clear { background: #475569; }

    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(34,197,94,0.15);
      color: var(--success);
      font-size: 14px;
      font-weight: 500;
    }

    .camera {
      height: 260px;
      border-radius: 14px;
      background: linear-gradient(145deg, #020617, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      border: 1px dashed #334155;
    }

    footer {
      margin-top: 26px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <div>
        <h1>Smart Attendance System</h1>
        <span>Face Recognition & Uniform Validation</span>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h2>Student Registration</h2>
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" placeholder="Enter ID" />
        </div>
        <div class="form-group">
          <label>Student Name</label>
          <input type="text" placeholder="Enter Name" />
        </div>

        <div class="buttons">
          <button class="add">Add Face</button>
          <button class="train">Train Model</button>
          <button class="recognise">Recognise</button>
          <button class="clear">Clear</button>
        </div>

        <div class="status">
          Status: Ready to capture and recognise faces
        </div>
      </div>

      <div class="card">
        <h2>Live Camera</h2>
        <div class="camera">
          Camera Feed / OpenCV Window
        </div>
      </div>
    </div>

    <footer>
      © 2026 Smart Attendance • Python OpenCV • LBPH
    </footer>
  </div>

</body>
</html>
